<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Lumi · 每日儀式</title>

    <!-- 加入主畫面後以全螢幕 App 模式開啟 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lumi" />
    <meta name="theme-color" content="#FBF7EC" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-180.png" />

    <!-- Tailwind（CDN 版，原型使用；正式產品建議改為編譯版） -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 嘗試以程式鎖定直向（支援的瀏覽器 / 已加入主畫面時有效） -->
    <script>
      function lockPortrait() {
        try {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock("portrait").catch(function(){});
          }
        } catch (e) {}
      }
      window.addEventListener("load", lockPortrait);
      document.addEventListener("visibilitychange", function () {
        if (!document.hidden) lockPortrait();
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
